# Production overlay — apply with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# In real production you'd point DATABASE_URL/REDIS_URL at managed services
# (Neon/RDS, Upstash/ElastiCache) and run only backend + worker containers.

services:
  control-plane:
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
    deploy:
      replicas: 2  # backend horizontal scaling for HA
      resources:
        limits:
          memory: 768M
          cpus: "1.5"
        reservations:
          memory: 256M

  go-worker:
    environment:
      - ENVIRONMENT=production
      - LOG_FORMAT=json
    deploy:
      replicas: 5  # scale workers independently from API
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 192M

  frontend:
    build:
      context: ./frontend
      target: production  # nginx static build
    ports:
      - "80:80"

  postgres:
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  redis:
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
    deploy:
      resources:
        limits:
          memory: 640M
          cpus: "0.5"
