services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: replayforge_cp
      POSTGRES_PASSWORD: replayforge_cp_pwd
      POSTGRES_DB: replayforge
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
